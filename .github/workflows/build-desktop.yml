name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            zip_flag: --zip
          - os: windows-latest
            zip_flag: --zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build desktop app
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          API_BASE_URL: https://ascent-inventory.onrender.com
        run: python scripts/build_desktop.py ${{ matrix.zip_flag }}

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Ascent-Inventory-macOS
          path: |
            dist/Ascent Inventory.app
            dist/Ascent-Inventory-macOS.zip

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Ascent-Inventory-Windows
          path: |
            dist/Ascent Inventory/**
            dist/Ascent-Inventory-Windows.zip
